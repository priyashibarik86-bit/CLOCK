<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Clock</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep:    #060a14;
            --bg-card:    #0d1526;
            --accent:     #00e5ff;
            --accent-dim: #0097a7;
            --glow:       rgba(0, 229, 255, 0.35);
            --text-main:  #e0f7fa;
            --text-muted: #607d8b;
            --border:     rgba(0, 229, 255, 0.18);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100dvh;
            background: var(--bg-deep);
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ── Animated mesh background ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 50% at 20% 30%, rgba(0,229,255,.07) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 70%, rgba(0,151,167,.06) 0%, transparent 55%);
            pointer-events: none;
        }

        /* ── Scanline overlay ── */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                to bottom,
                transparent 0px,
                transparent 3px,
                rgba(0,229,255,.018) 3px,
                rgba(0,229,255,.018) 4px
            );
            pointer-events: none;
            z-index: 0;
        }

        /* ── Main card ── */
        .clock-card {
            position: relative;
            z-index: 1;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: clamp(2rem, 6vw, 4rem) clamp(1.5rem, 8vw, 5rem);
            text-align: center;
            box-shadow:
                0 0 60px rgba(0,229,255,.08),
                0 0 0 1px rgba(0,229,255,.06) inset,
                0 30px 80px rgba(0,0,0,.6);
            animation: cardIn .8s cubic-bezier(.22,1,.36,1) both;
            max-width: 680px;
            width: 92vw;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(30px) scale(.97); }
            to   { opacity: 1; transform: translateY(0)   scale(1);    }
        }

        /* ── Top accent bar ── */
        .clock-card::before {
            content: '';
            display: block;
            width: 64px;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            border-radius: 999px;
            margin: 0 auto 2rem;
        }

        /* ── Label ── */
        .clock-label {
            font-family: 'Rajdhani', sans-serif;
            font-size: clamp(.75rem, 2vw, .9rem);
            font-weight: 600;
            letter-spacing: .25em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 1rem;
            animation: fadeUp .6s .2s both;
        }

        /* ── Time display ── */
        .clock-time {
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: clamp(2.4rem, 10vw, 5rem);
            color: var(--text-main);
            letter-spacing: .05em;
            line-height: 1;
            text-shadow:
                0 0 20px var(--glow),
                0 0 50px rgba(0,229,255,.15);
            animation: fadeUp .6s .35s both;
            /* keep width stable so layout doesn't shift */
            min-width: min(100%, 520px);
            display: inline-block;
        }

        /* ── Separator pulse ── */
        .clock-sep {
            display: inline-block;
            animation: blink 1s step-end infinite;
            color: var(--accent);
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0; }
        }

        /* ── Date row ── */
        .clock-date {
            margin-top: 1.4rem;
            font-size: clamp(.85rem, 2.5vw, 1.05rem);
            font-weight: 400;
            letter-spacing: .12em;
            color: var(--accent-dim);
            animation: fadeUp .6s .5s both;
        }

        /* ── Divider ── */
        .clock-divider {
            width: 100%;
            height: 1px;
            background: var(--border);
            margin: 1.8rem 0;
            animation: fadeUp .6s .55s both;
        }

        /* ── Footer badges ── */
        .clock-footer {
            display: flex;
            justify-content: center;
            gap: .75rem;
            flex-wrap: wrap;
            animation: fadeUp .6s .65s both;
        }

        .badge-pill {
            font-family: 'Rajdhani', sans-serif;
            font-size: .75rem;
            font-weight: 600;
            letter-spacing: .15em;
            text-transform: uppercase;
            padding: .35em .9em;
            border-radius: 999px;
            border: 1px solid var(--border);
            color: var(--text-muted);
            background: rgba(0,229,255,.04);
        }

        .badge-live {
            color: var(--accent);
            border-color: rgba(0,229,255,.35);
            background: rgba(0,229,255,.07);
            display: flex;
            align-items: center;
            gap: .4em;
        }

        .dot-live {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 6px var(--accent);
            animation: pulse 1.4s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1);   opacity: 1;   }
            50%       { transform: scale(1.5); opacity: .6; }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0);    }
        }
    </style>
</head>
<body>

  <div class="clock-card">

    <p class="clock-label">System Time</p>

    <h1 class="clock-time" id="watch">
      00<span class="clock-sep">:</span>00<span class="clock-sep">:</span>00
    </h1>

    <p class="clock-date" id="dateDisplay">Loading…</p>

    <div class="clock-divider"></div>

    <div class="clock-footer">
      <span class="badge-pill badge-live">
        <span class="dot-live"></span>Live
      </span>
      <span class="badge-pill">Local Time</span>
      <span class="badge-pill" id="tzBadge">—</span>
    </div>

  </div>

  <!-- Bootstrap JS (optional, for future components) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- ⚠️  Your original script — NOT modified -->
  <script src="pro.js"></script>

  <!-- Extras that don't touch the clock JS -->
  <script>
    // Populate date & timezone badges (independent of pro.js)
    function updateMeta() {
      const now = new Date();
      const opts = { weekday:'long', year:'numeric', month:'long', day:'numeric' };
      document.getElementById('dateDisplay').textContent =
        now.toLocaleDateString(undefined, opts);
      document.getElementById('tzBadge').textContent =
        Intl.DateTimeFormat().resolvedOptions().timeZone;
    }
    updateMeta();
    setInterval(updateMeta, 60000);
  </script>

</body>
</html>
